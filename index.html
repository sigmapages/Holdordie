<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAY ON POINT - FULL VERSION</title>
    <style>
        :root { --bg: #000; --accent: #ff0000; --text: #ff0000; }
        body { margin:0; overflow:hidden; background: var(--bg); font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; transition: background 0.5s; }
        canvas { display:block; }
        #overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            background: rgba(0,0,0,0.95); z-index: 100; color: var(--text); text-align: center;
        }
        .theme-selector { display: flex; gap: 10px; margin: 20px 0; }
        .theme-btn {
            padding: 8px 15px; cursor: pointer; border: 2px solid; border-radius: 4px;
            background: transparent; font-weight: bold; font-size: 12px; transition: 0.3s;
        }
        .t-nightmare { border-color: #ff0000; color: #ff0000; }
        .t-space { border-color: #00d4ff; color: #00d4ff; }
        .t-chill { border-color: #ff9ff3; color: #ff9ff3; }
        
        #startBtn {
            padding:15px 60px; font-size:24px; font-weight:bold; cursor:pointer;
            background: var(--accent); color: white; border: none; border-radius: 5px;
            box-shadow: 0 0 20px var(--accent);
        }
        .best-label { color: #fff; margin-top: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 id="title" style="letter-spacing: 5px;">STAY ON POINT</h1>
    <div class="theme-selector">
        <button class="theme-btn t-nightmare" onclick="setTheme('nightmare')">NIGHTMARE</button>
        <button class="theme-btn t-space" onclick="setTheme('space')">SPACE</button>
        <button class="theme-btn t-chill" onclick="setTheme('chill')">CHILL</button>
    </div>
    <button id="startBtn">START MISSION</button>
    <div class="best-label" id="bestDisplay">BEST: 0.00s</div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const bestDisplay = document.getElementById('bestDisplay');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const themes = {
    nightmare: { bg: "#000", accent: "#ff0000", flash: "#1a0000", trap: "#ff00ff" },
    space: { bg: "#020b1a", accent: "#00d4ff", flash: "#041630", trap: "#f1c40f" },
    chill: { bg: "#f7f1e3", accent: "#ff9ff3", flash: "#f7f1e3", trap: "#5758bb" }
};
let currentTheme = "nightmare";

function setTheme(name) {
    currentTheme = name;
    const t = themes[name];
    document.documentElement.style.setProperty('--bg', t.bg);
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--text', t.accent);
    overlay.style.backgroundColor = (name === 'chill') ? "rgba(255,255,255,0.95)" : "rgba(0,0,0,0.95)";
    updateBestDisplay();
}

function updateBestDisplay() {
    let best = localStorage.getItem('best_score_vfinal') || 0;
    bestDisplay.innerText = `BEST: ${parseFloat(best).toFixed(2)}s`;
}

// --- LOGIC GAME ---
let phase = 1, time = 0, gameOver = false, canInput = false;
let buttons = [];
let mouse = { x: 0, y: 0 };
let shakeTime = 0;

class GameButton {
    constructor(x, y, r, color) {
        this.x = x; this.y = y; this.r = r; this.baseColor = color;
        this.active = false; this.state = 'idle'; this.timer = 0;
        this.vx = 0; this.vy = 0; this.targetAngle = 0;
    }

    update(dt) {
        if (phase < 2 || !this.active) return;
        this.timer -= dt;

        if (this.timer <= 0) {
            let isTrap = (phase >= 6 && Math.random() < 0.25);
            if (this.state === 'moving' || this.state === 'idle' || this.state === 'trap_active') {
                if (isTrap && this.state !== 'trap_active') {
                    this.state = 'trap_warning';
                    this.timer = 0.8; this.vx = 0; this.vy = 0;
                } else {
                    this.state = 'warning';
                    this.timer = (phase >= 7) ? 0.1 : 0.8;
                    this.targetAngle = Math.random() * Math.PI * 2;
                    this.vx = 0; this.vy = 0;
                }
            } else if (this.state === 'warning') {
                this.state = 'moving';
                this.timer = 1.5 + Math.random();
                let speed = 2.5 + (phase * 1.1);
                this.vx = Math.cos(this.targetAngle) * speed;
                this.vy = Math.sin(this.targetAngle) * speed;
            } else if (this.state === 'trap_warning') {
                this.state = 'trap_active';
                this.timer = 2.0;
                let speed = 3 + (phase * 0.8);
                let a = Math.random() * Math.PI * 2;
                this.vx = Math.cos(a) * speed; this.vy = Math.sin(a) * speed;
            }
        }

        if (this.state === 'moving' || this.state === 'trap_active') {
            this.x += this.vx; this.y += this.vy;
            if (this.x < this.r || this.x > canvas.width - this.r) this.vx *= -1;
            if (this.y < this.r || this.y > canvas.height - this.r) this.vy *= -1;
        }
    }

    draw() {
        const t = themes[currentTheme];
        if (this.state === 'trap_active') {
            // Draw Triangle Trap
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - this.r - 5);
            ctx.lineTo(this.x - this.r - 5, this.y + this.r);
            ctx.lineTo(this.x + this.r + 5, this.y + this.r);
            ctx.closePath();
            ctx.fillStyle = (currentTheme === 'chill') ? "#fff" : "#000";
            ctx.fill();
            ctx.strokeStyle = t.trap; ctx.lineWidth = 4; ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            let color = this.active ? this.baseColor : "#444";
            if (this.state === 'trap_warning') color = (Math.floor(time*10)%2===0) ? t.trap : this.baseColor;
            if (phase >= 4 && phase < 6 && this.active && Math.floor(time*6)%2===0) color = "#fff";
            ctx.fillStyle = color; ctx.fill();
            if (this.active) { ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke(); }
            
            // Arrow Warning (Hide in Phase 7)
            if (this.state === 'warning' && this.active && phase < 7) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.targetAngle);
                ctx.beginPath(); ctx.moveTo(this.r+5, 0); ctx.lineTo(this.r+30, 0);
                ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 3; ctx.stroke();
                ctx.restore();
            }
        }
    }
}

function resetGame() {
    phase = 1; time = 0; gameOver = false; canInput = false;
    buttons = [new GameButton(canvas.width/2, canvas.height/2, 45, themes[currentTheme].accent)];
    setTimeout(() => { canInput = true; }, 200);
}

function endGame() {
    if (gameOver) return;
    gameOver = true; shakeTime = 15;
    let best = localStorage.getItem('best_score_vfinal') || 0;
    if (time > best) {
        localStorage.setItem('best_score_vfinal', time);
    }
    updateBestDisplay();
}

function handleStart(ex, ey) {
    if (gameOver) { resetGame(); return; }
    if (!canInput) return;
    mouse.x = ex; mouse.y = ey;
    buttons.forEach(b => {
        if (Math.hypot(mouse.x - b.x, mouse.y - b.y) < b.r + 25) b.active = true;
    });
}

function handleEnd() {
    if (!canInput || gameOver) return;
    let normals = buttons.filter(b => b.state !== 'trap_active');
    if (normals.some(b => b.active)) {
        buttons.forEach(b => b.active = false);
        endGame();
    }
}

startBtn.onclick = () => { overlay.style.display='none'; resetGame(); };
canvas.addEventListener("mousedown", e => handleStart(e.clientX, e.clientY));
window.addEventListener("mouseup", handleEnd);
canvas.addEventListener("touchstart", e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
window.addEventListener("touchend", handleEnd);
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("touchmove", e => { e.preventDefault(); mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive:false});

function update() {
    if (gameOver || !canInput) return;
    let normals = buttons.filter(b => b.state !== 'trap_active');
    if (normals.every(b => b.active)) {
        time += 0.016;
        if (time < 5) phase = 1;
        else if (time < 12) phase = 2;
        else if (time < 22) phase = 3;
        else if (time < 35) phase = 4;
        else if (time < 45) phase = 5;
        else if (time < 60) phase = 6;
        else phase = 7;

        buttons.forEach(b => b.update(0.016));
        if (phase >= 3 && buttons.length < 2) buttons.push(new GameButton(Math.random()*canvas.width, Math.random()*canvas.height, 40, '#2ed573'));
        if (phase >= 5 && buttons.length < 3) buttons.push(new GameButton(Math.random()*canvas.width, Math.random()*canvas.height, 35, '#3742fa'));

        // Check if finger left normal buttons
        normals.forEach(b => {
            if (Math.hypot(mouse.x - b.x, mouse.y - b.y) > b.r + 35) endGame();
        });
        // Check if finger is touching trap
        buttons.forEach(b => {
            if (b.state === 'trap_active' && Math.hypot(mouse.x - b.x, mouse.y - b.y) < b.r + 10) endGame();
        });
    }
}

function draw() {
    ctx.save();
    if (shakeTime > 0) { ctx.translate(Math.random()*10-5, Math.random()*10-5); shakeTime--; }
    
    let t = themes[currentTheme];
    let bg = t.bg;
    if (phase >= 4 && currentTheme !== 'chill' && Math.floor(time * 10) % 2 === 0) bg = t.flash;
    ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

    buttons.forEach(b => b.draw());

    ctx.fillStyle = (currentTheme === 'chill') ? "#555" : t.accent;
    ctx.font = "bold 20px Monospace";
    ctx.fillText(`PHASE:${phase} TIME:${time.toFixed(2)}s`, 20, 40);

    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center"; ctx.fillStyle = t.accent; ctx.font = "bold 45px Arial";
        ctx.fillText("MISSION FAILED", canvas.width/2, canvas.height/2);
        ctx.fillStyle = "white"; ctx.font = "18px Arial";
        ctx.fillText(`SCORE: ${time.toFixed(2)}s`, canvas.width/2, canvas.height/2 + 50);
        ctx.fillText("TAP TO RESTART", canvas.width/2, canvas.height/2 + 90);
        ctx.textAlign = "left";
    }
    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
setTheme('nightmare');
</script>
</body>
</html>
