<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ĐỪNG RỜI TAY</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; }
        canvas { display:block; }
        #overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            background: rgba(0,0,0,0.98); z-index: 100; color: #ff0000; text-align: center;
        }
        button {
            padding:15px 50px; font-size:26px; font-weight:bold; cursor:pointer;
            background: transparent; color: #ff0000; border: 3px solid #ff0000; border-radius: 5px;
            text-transform: uppercase; letter-spacing: 3px; transition: 0.2s;
        }
        button:hover { background: #ff0000; color: white; box-shadow: 0 0 30px #ff0000; }
        .desc { color: #555; margin: 20px 0 40px; font-size: 14px; line-height: 1.6; }
        .warning-text { color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="letter-spacing: 10px; font-size: 40px;">NIGHTMARE</h1>
    <p class="desc">
        Phase 1-5: Giữ tất cả các nút.<br>
        <span class="warning-text">PHASE 6: THẢ TAY KHI NÚT HÓA TAM GIÁC TÍM!</span><br>
        PHASE 7: KHÔNG CÒN CẢNH BÁO HƯỚNG ĐI.
    </p>
    <button id="startBtn">ACCEPT RISK</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let phase = 1, time = 0, gameOver = false, canInput = false;
let buttons = [];
let mouse = { x: 0, y: 0 };
let bestTime = localStorage.getItem('bestTime_nightmare') || 0;
let shakeTime = 0;

class GameButton {
    constructor(x, y, r, color) {
        this.x = x; this.y = y; this.r = r; this.baseColor = color;
        this.active = false;
        this.state = 'idle'; // idle, warning, moving, trap_warning, trap_active
        this.timer = 0;
        this.targetAngle = 0;
        this.vx = 0; this.vy = 0;
    }

    update(dt) {
        if (phase < 2 || !this.active) return;
        this.timer -= dt;

        // Logic chuyển đổi State
        if (this.timer <= 0) {
            this.handleStateChange();
        }

        // Logic di chuyển
        if (this.state === 'moving' || this.state === 'trap_active') {
            this.x += this.vx; this.y += this.vy;
            // Va chạm tường
            if (this.x < this.r || this.x > canvas.width - this.r) this.vx *= -1;
            if (this.y < this.r || this.y > canvas.height - this.r) this.vy *= -1;
        }
    }

    handleStateChange() {
        // Tỉ lệ biến thành bẫy ở Phase 6+
        let trapChance = (phase >= 6) ? 0.3 : 0;
        
        if (this.state === 'moving' || this.state === 'idle' || this.state === 'trap_active') {
            if (Math.random() < trapChance && this.state !== 'trap_active') {
                // CHUYỂN SANG BẪY (PHASE 6+)
                this.state = 'trap_warning';
                this.timer = 0.8; // 0.8 giây nháy tím cảnh báo
                this.vx = 0; this.vy = 0;
            } else {
                // DI CHUYỂN BÌNH THƯỜNG
                this.state = 'warning';
                this.timer = (phase >= 7) ? 0.1 : 1.0; // Phase 7: Cảnh báo cực ngắn (gần như bỏ)
                this.targetAngle = Math.random() * Math.PI * 2;
                this.vx = 0; this.vy = 0;
            }
        } else if (this.state === 'warning') {
            // Hết cảnh báo -> Bắt đầu di chuyển
            this.state = 'moving';
            this.timer = 1.5 + Math.random();
            let speed = 2.5 + (phase * 1.2);
            this.vx = Math.cos(this.targetAngle) * speed;
            this.vy = Math.sin(this.targetAngle) * speed;
        } else if (this.state === 'trap_warning') {
            // Hết cảnh báo bẫy -> Biến thành Tam Giác Tử Thần
            this.state = 'trap_active';
            this.timer = 2.0; // Tồn tại 2 giây
            // Tam giác cũng di chuyển loăng quăng
            let speed = 3 + (phase * 1.0);
            let angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
        }
    }

    draw() {
        // 1. Vẽ mũi tên cảnh báo (Chỉ hiện khi < Phase 7 và state là warning)
        if (phase < 7 && this.state === 'warning' && this.active) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.targetAngle);
            ctx.beginPath(); ctx.moveTo(this.r + 5, 0); ctx.lineTo(this.r + 35, 0);
            ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 3; ctx.stroke();
            // Đầu mũi tên
            ctx.beginPath(); ctx.moveTo(this.r + 35, 0); ctx.lineTo(this.r + 28, -8); ctx.lineTo(this.r + 28, 8); ctx.closePath();
            ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.fill();
            ctx.restore();
        }

        // 2. Vẽ Nút / Bẫy
        if (this.state === 'trap_active') {
            // VẼ TAM GIÁC TỬ THẦN
            this.drawTriangle(this.x, this.y, this.r + 5, "#ff00ff", "#000");
        } else {
            // VẼ NÚT TRÒN BÌNH THƯỜNG
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            
            let color = this.active ? this.baseColor : "#222";
            // Hiệu ứng cảnh báo bẫy
            if (this.state === 'trap_warning') {
                color = (Math.floor(time * 10) % 2 === 0) ? "#ff00ff" : this.baseColor;
            }
            // Debuff nháy màu (Phase 4+)
            if (phase >= 4 && phase < 6 && this.active && Math.floor(time*6)%2===0) color = "#fff";

            ctx.fillStyle = color; ctx.fill();
            if (this.active) { ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke(); }
        }
    }

    drawTriangle(x, y, r, strokeColor, fillColor) {
        ctx.beginPath();
        ctx.moveTo(x, y - r); // Đỉnh trên
        ctx.lineTo(x - r, y + r/2); // Góc dưới trái
        ctx.lineTo(x + r, y + r/2); // Góc dưới phải
        ctx.closePath();
        ctx.fillStyle = fillColor; ctx.fill();
        ctx.strokeStyle = strokeColor; ctx.lineWidth = 4; ctx.stroke();
        // Vẽ tâm tam giác để user biết chỗ né
        ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fillStyle="#ff00ff"; ctx.fill();
    }
}

function resetGame() {
    phase = 1; time = 0; gameOver = false; canInput = false;
    // Nút chính màu đỏ
    buttons = [new GameButton(canvas.width/2, canvas.height/2, 45, '#ff0000')];
    setTimeout(() => { canInput = true; }, 200);
}

function endGame(reason) {
    if (gameOver) return;
    gameOver = true; shakeTime = 20;
    if (time > bestTime) {
        bestTime = time.toFixed(2);
        localStorage.setItem('bestTime_nightmare', bestTime);
    }
}

// --- INPUTS ---
function handleStart(ex, ey) {
    if (gameOver) { resetGame(); return; }
    if (!canInput) return;
    mouse.x = ex; mouse.y = ey;
    buttons.forEach(b => {
        if (Math.hypot(mouse.x - b.x, mouse.y - b.y) < b.r + 25) b.active = true;
    });
}

function handleEnd() {
    if (!canInput || gameOver) return;
    // Nếu buông tay khi nút đang active (không phải bẫy) => THUA
    let normalButtons = buttons.filter(b => b.state !== 'trap_active');
    if (normalButtons.some(b => b.active)) {
        buttons.forEach(b => b.active = false);
        endGame("Tuột tay");
    }
}

startBtn.addEventListener('click', () => { overlay.style.display='none'; resetGame(); });
canvas.addEventListener("mousedown", e => handleStart(e.clientX, e.clientY));
window.addEventListener("mouseup", handleEnd);
canvas.addEventListener("touchstart", e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
window.addEventListener("touchend", handleEnd);
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("touchmove", e => { e.preventDefault(); mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive:false});

// --- CORE LOOP ---
function update() {
    if (gameOver || !canInput) return;

    // Kiểm tra tất cả nút normal có được giữ không
    let normalButtons = buttons.filter(b => b.state !== 'trap_active');
    const allNormalActive = normalButtons.length > 0 && normalButtons.every(b => b.active);
    
    if (allNormalActive) {
        time += 0.016;
        
        // Cập nhật Phase (Gắt hơn bản cũ)
        if (time < 5) phase = 1;
        else if (time < 12) phase = 2;
        else if (time < 22) phase = 3;
        else if (time < 35) phase = 4;
        else if (time < 45) phase = 5;
        else if (time < 60) phase = 6; // TRAP PHASE
        else phase = 7; // BLIND PHASE

        buttons.forEach(b => b.update(0.016));

        // Phase 3 & 5: Thêm nút
        if (phase >= 3 && buttons.length < 2) buttons.push(new GameButton(Math.random()*canvas.width, Math.random()*canvas.height, 40, '#00ff00'));
        if (phase >= 5 && buttons.length < 3) buttons.push(new GameButton(Math.random()*canvas.width, Math.random()*canvas.height, 35, '#0000ff'));

        // Check tuột tay khỏi nút thường
        normalButtons.forEach(b => {
            if (Math.hypot(mouse.x - b.x, mouse.y - b.y) > b.r + 35) endGame("Tuột tay");
        });
    }

    // CHECK ĐIỀU KIỆN THUA PHASE 6 (CHẠM BẪY)
    if (phase >= 6) {
        buttons.forEach(b => {
            if (b.state === 'trap_active' && b.active) {
                // Tay vẫn chạm vào khi nó là tam giác bẫy => OẲNG
                endGame("Chạm bẫy tam giác");
            }
        });
    }
}

function draw() {
    ctx.save();
    if (shakeTime > 0) { ctx.translate(Math.random()*15-7.5, Math.random()*15-7.5); shakeTime--; }

    // Background nhấp nháy đỏ khi < Phase 4 hoặc Phase 6+
    let bg = "#000";
    if (phase >= 4 && phase < 6 && Math.floor(time * 8) % 2 === 0) bg = "#080808";
    if (phase >= 6 && Math.floor(time * 6) % 2 === 0) bg = "#100000"; // Nháy đỏ Phase bẫy
    ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

    buttons.forEach(b => b.draw());

    // UI (Phong cách Hacker/Nightmare)
    ctx.fillStyle = "#ff0000"; ctx.font = "bold 18px Monospace";
    ctx.fillText(`PHASE_${phase}`, 25, 45);
    ctx.fillText(`TIME_${time.toFixed(2)}`, 25, 75);
    ctx.fillStyle = "#333";
    ctx.fillText(`BEST_${bestTime}`, 25, 105);

    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.95)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center"; ctx.fillStyle = "#ff0000"; ctx.font = "bold 50px Arial";
        ctx.fillText("SYSTEM FAILURE", canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = "white"; ctx.font = "18px Monospace";
        ctx.fillText(`RATING: ${time.toFixed(2)}s`, canvas.width/2, canvas.height/2 + 40);
        ctx.fillText("TAP SCREEN TO REBOOT", canvas.width/2, canvas.height/2 + 90);
        ctx.textAlign = "left";
    }
    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
