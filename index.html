<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hold Or Die</title>
    <style>
        :root { --bg: #000; --accent: #ff0000; --text: #ff0000; }
        body { margin:0; overflow:hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; transition: background 0.5s; }
        canvas { display:block; }
        #overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            background: rgba(0,0,0,0.9); z-index: 100; color: var(--text); text-align: center;
        }
        .theme-selector { display: flex; gap: 10px; margin-bottom: 30px; }
        .theme-btn {
            padding: 10px 20px; cursor: pointer; border: 2px solid; border-radius: 5px;
            background: transparent; font-weight: bold; transition: 0.3s;
        }
        /* Theme Styles */
        .t-nightmare { border-color: #ff0000; color: #ff0000; }
        .t-space { border-color: #00d4ff; color: #00d4ff; }
        .t-chill { border-color: #ff9ff3; color: #ff9ff3; }
        
        #startBtn {
            padding:15px 60px; font-size:24px; font-weight:bold; cursor:pointer;
            background: var(--accent); color: white; border: none; border-radius: 50px;
            box-shadow: 0 0 20px var(--accent);
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 id="title">STAY ON POINT</h1>
    <div class="theme-selector">
        <button class="theme-btn t-nightmare" onclick="setTheme('nightmare')">NIGHTMARE</button>
        <button class="theme-btn t-space" onclick="setTheme('space')">SPACE</button>
        <button class="theme-btn t-chill" onclick="setTheme('chill')">CHILL</button>
    </div>
    <button id="startBtn">START</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- THEME CONFIG ---
const themes = {
    nightmare: { bg: "#000", accent: "#ff0000", btn: "#ff0000", flash: "#150000", particle: "#ff0000" },
    space: { bg: "#020b1a", accent: "#00d4ff", btn: "#00d4ff", flash: "#041630", particle: "#00d4ff" },
    chill: { bg: "#f7f1e3", accent: "#ff9ff3", btn: "#ff9ff3", flash: "#f7f1e3", particle: "#ff9ff3" }
};
let currentTheme = "nightmare";

function setTheme(name) {
    currentTheme = name;
    const t = themes[name];
    document.documentElement.style.setProperty('--bg', t.bg);
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--text', t.accent);
    overlay.style.backgroundColor = (name === 'chill') ? "rgba(255,255,255,0.9)" : "rgba(0,0,0,0.9)";
}

// --- GAME LOGIC ---
let phase = 1, time = 0, gameOver = false, canInput = false;
let buttons = [];
let mouse = { x: 0, y: 0 };
let bestTime = localStorage.getItem('best_v3') || 0;

class GameButton {
    constructor(x, y, r, color) {
        this.x = x; this.y = y; this.r = r; this.baseColor = color;
        this.active = false; this.state = 'idle'; this.timer = 0;
        this.vx = 0; this.vy = 0; this.targetAngle = 0;
    }
    update(dt) {
        if (phase < 2 || !this.active) return;
        this.timer -= dt;
        if (this.timer <= 0) {
            if (this.state === 'warning') {
                this.state = 'moving';
                this.timer = 1.5 + Math.random();
                let speed = 2 + (phase * 1.1);
                this.vx = Math.cos(this.targetAngle) * speed;
                this.vy = Math.sin(this.targetAngle) * speed;
            } else {
                this.state = 'warning';
                this.timer = (phase >= 7) ? 0.1 : 0.8;
                this.targetAngle = Math.random() * Math.PI * 2;
                this.vx = 0; this.vy = 0;
            }
        }
        if (this.state === 'moving') {
            this.x += this.vx; this.y += this.vy;
            if (this.x < this.r || this.x > canvas.width - this.r) this.vx *= -1;
            if (this.y < this.r || this.y > canvas.height - this.r) this.vy *= -1;
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        let color = this.active ? this.baseColor : "#555";
        if (currentTheme === 'chill' && !this.active) color = "#d1d1d1";
        ctx.fillStyle = color; ctx.fill();
        if (this.active) {
            ctx.strokeStyle = (currentTheme === 'chill') ? "#fff" : "white";
            ctx.lineWidth = 3; ctx.stroke();
        }
        // Draw warning arrow (Space/Nightmare only)
        if (this.state === 'warning' && this.active && phase < 7) {
            ctx.strokeStyle = themes[currentTheme].accent;
            ctx.beginPath(); ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + Math.cos(this.targetAngle)*60, this.y + Math.sin(this.targetAngle)*60);
            ctx.stroke();
        }
    }
}

function resetGame() {
    phase = 1; time = 0; gameOver = false; canInput = false;
    buttons = [new GameButton(canvas.width/2, canvas.height/2, 45, themes[currentTheme].accent)];
    setTimeout(() => { canInput = true; }, 200);
}

function handleStart(ex, ey) {
    if (gameOver) { resetGame(); return; }
    if (!canInput) return;
    mouse.x = ex; mouse.y = ey;
    buttons.forEach(b => {
        if (Math.hypot(mouse.x - b.x, mouse.y - b.y) < b.r + 20) b.active = true;
    });
}

function handleEnd() {
    if (!canInput || gameOver) return;
    if (buttons.some(b => b.active)) {
        buttons.forEach(b => b.active = false);
        gameOver = true;
        if (time > bestTime) { bestTime = time.toFixed(2); localStorage.setItem('best_v3', bestTime); }
    }
}

startBtn.onclick = () => { overlay.style.display='none'; resetGame(); };
canvas.addEventListener("mousedown", e => handleStart(e.clientX, e.clientY));
window.addEventListener("mouseup", handleEnd);
canvas.addEventListener("touchstart", e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
window.addEventListener("touchend", handleEnd);
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("touchmove", e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive:false});

function update() {
    if (gameOver || !canInput) return;
    if (buttons.every(b => b.active)) {
        time += 0.016;
        if (time < 5) phase = 1;
        else if (time < 12) phase = 2;
        else if (time < 22) phase = 3;
        else if (time < 35) phase = 4;
        else if (time < 45) phase = 5;
        else if (time < 60) phase = 6;
        else phase = 7;

        buttons.forEach(b => b.update(0.016));
        if (phase >= 3 && buttons.length < 2) buttons.push(new GameButton(Math.random()*canvas.width, Math.random()*canvas.height, 40, (currentTheme==='chill'?'#54a0ff':'#2ed573')));
        if (phase >= 5 && buttons.length < 3) buttons.push(new GameButton(Math.random()*canvas.width, Math.random()*canvas.height, 35, (currentTheme==='chill'?'#5f27cd':'#3742fa')));

        buttons.forEach(b => {
            if (Math.hypot(mouse.x - b.x, mouse.y - b.y) > b.r + 30) {
                gameOver = true;
                if (time > bestTime) { bestTime = time.toFixed(2); localStorage.setItem('best_v3', bestTime); }
            }
        });
    }
}

function draw() {
    let t = themes[currentTheme];
    let bg = t.bg;
    // Flash effect for Nightmare/Space
    if (phase >= 4 && currentTheme !== 'chill' && Math.floor(time * 10) % 2 === 0) bg = t.flash;
    
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Space theme Starfield (Simple)
    if (currentTheme === 'space') {
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        for(let i=0; i<20; i++) ctx.fillRect((Math.sin(i+time)*canvas.width), (i*50)%canvas.height, 2, 2);
    }

    buttons.forEach(b => b.draw());

    ctx.fillStyle = (currentTheme === 'chill') ? "#555" : t.accent;
    ctx.font = "bold 20px Monospace";
    ctx.fillText(`P:${phase} T:${time.toFixed(2)}`, 20, 40);

    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center";
        ctx.fillStyle = t.accent;
        ctx.font = "bold 40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
        ctx.fillStyle = "white";
        ctx.fillText(`BEST: ${bestTime}s`, canvas.width/2, canvas.height/2 + 50);
        ctx.textAlign = "left";
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
setTheme('nightmare');
</script>
</body>
</html>
